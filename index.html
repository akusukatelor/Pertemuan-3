<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pendaftaran Praktikan</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #e0eafc, #cfdef3);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .form-container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
        }

        h2 {
            color: #333;
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 22px;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 10px;
        }

        table {
            width: 100%;
        }

        td {
            padding: 8px 0;
            vertical-align: top;
            color: #555;
            font-size: 14px;
        }

        input[type="text"],
        input[type="password"],
        input[type="email"],
        select,
        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus, textarea:focus, select:focus {
            border-color: #4a90e2;
        }

        .input-readonly {
            background-color: #f5f5f5;
        }

        .radio-group, .checkbox-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .button-group {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        input[type="submit"] {
            background-color: #4a90e2;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }

        input[type="submit"]:hover {
            background-color: #357abd;
        }

        input[type="reset"] {
            background-color: #f1f1f1;
            color: #555;
            border: 1px solid #ddd;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
        }

        input[type="reset"]:hover {
            background-color: #e5e5e5;
        }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Formulir Pendaftaran Praktikan</h2>

    <form action="#" method="post">
        <table>
            <tr>
                <td width="35%">Nama</td>
                <td>: <input type="text" name="nama" value="Alfin Ilham Berlianto"></td>
            </tr>
            <tr>
                <td width="35%">Nim</td>
                <td>: <input type="text" name="nama" value="2311102047"></td>
            </tr>
            <tr>
                <td>Username</td>
                <td>: <input type="text" name="username" value="Alfin Ilham" class="input-readonly"></td>
            </tr>
            <tr>
                <td>Password</td>
                <td>: <input type="password" name="password" value="12345678"></td>
            </tr>
            <tr>
                <td>Email</td>
                <td>: <input type="email" name="email" placeholder="Input Email"></td>
            </tr>
            <tr>
                <td>Jenis Kelamin</td>
                <td>: 
                    <input type="radio" name="jk" value="Pria"> Pria 
                    <input type="radio" name="jk" value="Wanita" checked> Wanita
                </td>
            </tr>
            <tr>
                <td>Hobi</td>
                <td>: 
                    <div style="display: inline-block; vertical-align: top;">
                        <input type="checkbox" name="hobi[]" value="Renang" checked> Renang <br>
                        <input type="checkbox" name="hobi[]" value="Bersepeda"> Bersepeda <br>
                        <input type="checkbox" name="hobi[]" value="Memancing" checked> Memancing
                    </div>
                </td>
            </tr>
            <tr>
                <td>Jenjang Pendidikan</td>
                <td>: 
                    <select name="pendidikan">
                        <option value="">------Pilih------</option>
                        <option value="D3">Tamat D3</option>
                        <option value="S1">Tamat S1</option>
                        <option value="S2">Tamat S2</option>
                        <option value="S3">Tamat S3</option>
                    </select>
                </td>
            </tr>
            <tr>
                <td>Kritik & Saran</td>
                <td>: 
                    <textarea name="saran" rows="4"></textarea>
                </td>
            </tr>
        </table>

        <div class="button-group">
            <input type="reset" value="Cancel">
            <input type="submit" value="Submit">
        </div>
    </form>
</div>

</body>
</html>
