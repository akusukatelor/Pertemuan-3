<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        .hero-section {
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), 
                        url('https://shopee.co.id/inspirasi-shopee/wp-content/uploads/2024/11/wisata-puncak-bogor.webp'); 
            background-color: #2c3e50; 
            background-size: cover;
            background-position: center;
            min-height: 100vh;
            display: flex;
            align-items: center;
            color: white;
        }

        .profile-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            padding: 30px;
        }

        .btn-info {
            background-color: #0dcaf0 !important;
            border: none;
            color: white !important;
        }
    </style>
</head>
<body>

    <section class="hero-section">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-lg-6 mb-5">
                    <h1 class="display-3 fw-bold">Udah dicopy tinggal di salin,  <span class="text-info"> Hai gw alfin</span></h1>
                    <p class="lead">Selamat datang di profil gw. si bocah bogor bat etdah</p>
                    <div class="d-flex gap-3">
                        <button class="btn btn-info px-4 py-2 rounded-pill fw-bold">Hubungi Saya</button>
                        <button class="btn btn-outline-light px-4 py-2 rounded-pill">Download CV</button>
                    </div>
                </div>

                <div class="col-lg-5 offset-lg-1">
                    <div class="profile-card shadow-lg">
                        <h3 class="mb-4 text-center">Biodata Diri</h3>
                        <table class="table table-borderless text-white">
                            <tr><td>Nama</td><td>: Alfin Ilham Berlianto</td></tr>
                            <tr><td>Alamat</td><td>: Tlajung Udik 01/07, Gunung Putri, Bogor</td></tr>
                            <tr><td>Keahlian</td><td>: Fullstack Developer</td></tr>
                            <tr><td>Hobi</td><td>: Sepak bola, game, ngoding, ngaji</td></tr>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bundle.min.js"></script>
</body>
</html>
